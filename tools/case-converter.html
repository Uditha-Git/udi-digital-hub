<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Case Converter | UDI Digital Hub</title>

<link rel="stylesheet" href="../style.css">

<style>
.container {
    max-width: 750px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:var(--primary-blue);
}

textarea{
    width:100%;
    height:220px;
    margin-top:15px;
    padding:12px;
    border-radius:8px;
    border:2px solid #ddd;
    font-size:16px;
    resize:vertical;
    box-sizing:border-box;
}

.button-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-top:20px;
}

.info{
    margin-top:20px;
    font-size:16px;
    text-align:center;
    font-weight:bold;
    color:var(--primary-blue);
}

.copy-message{
    margin-top:15px;
    font-weight:bold;
    display:none;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>🔤 Case Converter</h2>

<textarea
id="text"
placeholder="Type or paste your text here..."
oninput="updateCount()"></textarea>

<div class="button-grid">

<button onclick="toUpper()">UPPERCASE</button>

<button onclick="toLower()">lowercase</button>

<button onclick="toTitle()">Title Case</button>

<button onclick="toSentence()">Sentence case</button>

<button onclick="copyText()">Copy</button>

<button class="clearBtn" onclick="clearText()">Clear</button>

</div>

<div class="info">
Characters :
<span id="count">0</span>
</div>

<div id="copyMessage" class="copy-message"></div>

</div>

<script>

function getText(){
    return document.getElementById("text");
}

function updateCount(){
    document.getElementById("count").innerText =
    getText().value.length;
}

function toUpper(){
    getText().value = getText().value.toUpperCase();
    updateCount();
}

function toLower(){
    getText().value = getText().value.toLowerCase();
    updateCount();
}

function toTitle(){

    let txt = getText().value.toLowerCase();

    txt = txt.replace(/\b\w/g, function(c){
        return c.toUpperCase();
    });

    getText().value = txt;

    updateCount();
}

function toSentence(){

    let txt = getText().value.toLowerCase();

    txt = txt.replace(/(^\s*\w|[.!?]\s*\w)/g, function(c){
        return c.toUpperCase();
    });

    getText().value = txt;

    updateCount();
}

function copyText() {

    let text = getText().value;

    if(text.trim() === ""){
        showMessage("Nothing to copy!", "#e63946");
        return;
    }

    navigator.clipboard.writeText(text);

    showMessage("Copied to Clipboard!", "#16a34a");
}

function clearText(){

    getText().value = "";

    updateCount();

}

function showMessage(message, color){

    let msg = document.getElementById("copyMessage");

    msg.innerText = message;
    msg.style.color = color;
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 2000);

}

updateCount();

</script>

</body>
</html>
