<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP Range Calculator | UDI Digital Hub</title>

<link rel="stylesheet" href="../style.css">


<style>

.container{

    max-width:850px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);

}


h2{

    text-align:center;
    color:var(--primary-blue);

}


.description{

    text-align:center;
    color:#555;

}


label{

    display:block;
    margin-top:15px;
    font-weight:bold;

}


input{

    width:100%;
    padding:10px;
    margin-top:5px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;

}


.button-grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    margin-top:20px;

}



.result{

    margin-top:25px;
    border:2px solid #ddd;
    border-radius:10px;
    overflow:hidden;

}



table{

    width:100%;
    border-collapse:collapse;

}



th{

    background:var(--primary-blue);
    color:white;
    padding:12px;

}



td{

    padding:12px;
    border-bottom:1px solid #ddd;

}



tr:nth-child(even){

    background:#f8fafc;

}



.message{

    text-align:center;
    font-weight:bold;
    margin-top:15px;
    display:none;

}


</style>

</head>


<body>


<div class="container">


<h2>🌐 IP Range Calculator</h2>


<p class="description">
Calculate Network, Host Range and Broadcast Address
</p>



<label>
IPv4 Address
</label>


<input 
id="ip"
placeholder="Example: 192.168.1.100">



<label>
CIDR Prefix
</label>


<input 
id="cidr"
type="number"
min="0"
max="32"
placeholder="Example: 24">



<div class="button-grid">


<button onclick="calculateRange()">
Calculate
</button>


<button onclick="copyResult()">
Copy Result
</button>


<button class="clearBtn" onclick="clearData()">
Clear
</button>


</div>



<div class="message" id="message"></div>



<div class="result">


<table>


<tr>

<th>
Property
</th>

<th>
Value
</th>

</tr>



<tr>
<td>Network Address</td>
<td id="network">-</td>
</tr>


<tr>
<td>First Host</td>
<td id="firstHost">-</td>
</tr>


<tr>
<td>Last Host</td>
<td id="lastHost">-</td>
</tr>


<tr>
<td>Broadcast Address</td>
<td id="broadcast">-</td>
</tr>


<tr>
<td>Subnet Mask</td>
<td id="mask">-</td>
</tr>


<tr>
<td>Total Addresses</td>
<td id="total">-</td>
</tr>


<tr>
<td>Usable Hosts</td>
<td id="usable">-</td>
</tr>


</table>


</div>

<script>


function ipToInt(ip){

    return ip.split(".").reduce((acc, octet)=>{

        return (acc << 8) + parseInt(octet);

    },0) >>> 0;

}



function intToIp(int){

    return [

        (int >>> 24) & 255,

        (int >>> 16) & 255,

        (int >>> 8) & 255,

        int & 255

    ].join(".");

}




function validateIP(ip){

    let parts = ip.split(".");


    if(parts.length !== 4){
        return false;
    }


    return parts.every(part=>{

        if(part === "")
            return false;


        let num = Number(part);


        return Number.isInteger(num) &&
               num >=0 &&
               num <=255;

    });

}




function calculateRange(){


    let ip = document.getElementById("ip").value.trim();

    let cidr = parseInt(
        document.getElementById("cidr").value
    );



    if(!validateIP(ip) || isNaN(cidr) || cidr <0 || cidr >32){

        showMessage(
            "❌ Enter valid IP Address and CIDR",
            "red"
        );

        return;

    }



    let ipInt = ipToInt(ip);



    let mask;


    if(cidr === 0){

        mask = 0;

    }
    else{

        mask = (0xFFFFFFFF << (32-cidr)) >>>0;

    }




    let network = ipInt & mask;


    let broadcast = network | (~mask >>>0);




    let firstHost;

    let lastHost;



    if(cidr === 31){

        firstHost = network;

        lastHost = broadcast;

    }

    else if(cidr === 32){

        firstHost = network;

        lastHost = network;

    }

    else{

        firstHost = network + 1;

        lastHost = broadcast - 1;

    }




    let totalAddresses =
        Math.pow(2,32-cidr);



    let usableHosts;



    if(cidr >=31){

        usableHosts = totalAddresses;

    }
    else{

        usableHosts = totalAddresses - 2;

    }





    document.getElementById("network").innerText =
        intToIp(network);



    document.getElementById("firstHost").innerText =
        intToIp(firstHost);



    document.getElementById("lastHost").innerText =
        intToIp(lastHost);



    document.getElementById("broadcast").innerText =
        intToIp(broadcast);



    document.getElementById("mask").innerText =
        intToIp(mask);



    document.getElementById("total").innerText =
        totalAddresses;



    document.getElementById("usable").innerText =
        usableHosts;




    showMessage(
        "✅ Calculation completed",
        "green"
    );


}







function copyResult(){


    let result =

    "IP Range Calculator\n\n" +

    "Network Address: " +
    document.getElementById("network").innerText + "\n" +

    "First Host: " +
    document.getElementById("firstHost").innerText + "\n" +

    "Last Host: " +
    document.getElementById("lastHost").innerText + "\n" +

    "Broadcast Address: " +
    document.getElementById("broadcast").innerText + "\n" +

    "Subnet Mask: " +
    document.getElementById("mask").innerText + "\n" +

    "Total Addresses: " +
    document.getElementById("total").innerText + "\n" +

    "Usable Hosts: " +
    document.getElementById("usable").innerText;




    if(result.includes("-")){

        showMessage(
            "❌ Calculate first",
            "red"
        );

        return;

    }



    navigator.clipboard.writeText(result);



    showMessage(
        "📋 Copied to Clipboard!",
        "green"
    );


}







function showMessage(text,color){


    let msg = document.getElementById("message");


    msg.innerText = text;


    msg.style.color = color;


    msg.style.display = "block";



    setTimeout(()=>{

        msg.style.display="none";

    },2000);


}







function clearData(){


    document.getElementById("ip").value="";

    document.getElementById("cidr").value="";



    let fields=[

        "network",
        "firstHost",
        "lastHost",
        "broadcast",
        "mask",
        "total",
        "usable"

    ];



    fields.forEach(id=>{

        document.getElementById(id).innerText="-";

    });



    document.getElementById("message").style.display="none";


}



</script>


</body>

</html>
