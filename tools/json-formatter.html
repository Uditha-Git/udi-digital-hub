<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON Formatter | UDI Digital Hub</title>

<link rel="stylesheet" href="../style.css">

<style>
.container {
    max-width: 850px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,.1);
}

h2 {
    text-align: center;
    color: var(--primary-blue);
}

textarea {
    width: 100%;
    height: 200px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
    font-family: monospace;
    resize: vertical;
    box-sizing: border-box;
}

.output {
    width: 100%;
    height: 200px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
    font-family: monospace;
    background: #f8fafc;
    white-space: pre-wrap;
    overflow: auto;
}

.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.info {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.copy-message {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>📦 JSON Formatter</h2>

<textarea id="input" placeholder='Paste JSON here...'></textarea>

<div class="button-grid">

<button onclick="formatJSON()">Format JSON</button>

<button onclick="minifyJSON()">Minify JSON</button>

<button onclick="copyOutput()">Copy Output</button>

<button onclick="clearAll()" class="clearBtn">Clear</button>

</div>

<div class="info" id="status"></div>

<div class="output" id="output"></div>

<div id="copyMessage" class="copy-message"></div>

</div>

<script>

function showMessage(msg, color){
    let el = document.getElementById("copyMessage");
    el.innerText = msg;
    el.style.color = color;
    el.style.display = "block";

    setTimeout(() => {
        el.style.display = "none";
    }, 2000);
}

function formatJSON(){
    let input = document.getElementById("input").value;

    try {
        let obj = JSON.parse(input);
        let formatted = JSON.stringify(obj, null, 4);

        document.getElementById("output").innerText = formatted;
        document.getElementById("status").innerText = "✅ Valid JSON";
        document.getElementById("status").style.color = "green";

    } catch (e) {
        document.getElementById("output").innerText = "";
        document.getElementById("status").innerText = "❌ Invalid JSON";
        document.getElementById("status").style.color = "red";
    }
}

function minifyJSON(){
    let input = document.getElementById("input").value;

    try {
        let obj = JSON.parse(input);
        let minified = JSON.stringify(obj);

        document.getElementById("output").innerText = minified;
        document.getElementById("status").innerText = "✅ Minified JSON";
        document.getElementById("status").style.color = "green";

    } catch (e) {
        document.getElementById("output").innerText = "";
        document.getElementById("status").innerText = "❌ Invalid JSON";
        document.getElementById("status").style.color = "red";
    }
}

function copyOutput(){

    let text = document.getElementById("output").innerText;

    if(text.trim() === ""){
        showMessage("Nothing to copy!", "#e63946");
        return;
    }

    navigator.clipboard.writeText(text);

    showMessage("Copied to Clipboard!", "#16a34a");
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("output").innerText = "";
    document.getElementById("status").innerText = "";
}

</script>

</body>
</html>
