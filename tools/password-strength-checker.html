<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Strength Checker | UDI Digital Hub</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #0A4D8C;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}

.bar {
    height: 10px;
    width: 100%;
    background: #ddd;
    border-radius: 5px;
    margin-top: 15px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

#label {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}

ul {
    margin-top: 10px;
    padding-left: 20px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

    <h2>🔐 Password Strength Checker</h2>

    <input type="password" id="password" placeholder="Enter password">

    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>

    <div id="label">Strength: -</div>

    <ul id="suggestions"></ul>

</div>

<script>

const password = document.getElementById("password");
const progress = document.getElementById("progress");
const label = document.getElementById("label");
const suggestions = document.getElementById("suggestions");

password.addEventListener("input", function () {

    let value = password.value;
    let score = 0;
    let tips = [];

    if (value.length >= 8) score += 25;
    else tips.push("Use at least 8 characters");

    if (/[A-Z]/.test(value)) score += 25;
    else tips.push("Add uppercase letters");

    if (/[a-z]/.test(value)) score += 25;
    else tips.push("Add lowercase letters");

    if (/[0-9]/.test(value)) score += 15;
    else tips.push("Add numbers");

    if (/[^A-Za-z0-9]/.test(value)) score += 10;
    else tips.push("Add special characters");

    progress.style.width = score + "%";

    if (score < 40) {
        progress.style.background = "red";
        label.innerText = "Strength: Weak";
    } else if (score < 70) {
        progress.style.background = "orange";
        label.innerText = "Strength: Fair";
    } else if (score < 90) {
        progress.style.background = "#f1c40f";
        label.innerText = "Strength: Good";
    } else {
        progress.style.background = "green";
        label.innerText = "Strength: Strong";
    }

    suggestions.innerHTML = "";
    tips.forEach(tip => {
        let li = document.createElement("li");
        li.textContent = tip;
        suggestions.appendChild(li);
    });

});

</script>

</body>
</html>
