<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Encoder/Decoder | UDI Digital Hub</title>

<link rel="stylesheet" href="../style.css">

<style>
.container {
    max-width: 850px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,.1);
}

h2 {
    text-align: center;
    color: var(--primary-blue);
}

textarea {
    width: 100%;
    height: 180px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
    font-family: monospace;
}

.output {
    width: 100%;
    height: 180px;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #ddd;
    background: #f8fafc;
    font-family: monospace;
    white-space: pre-wrap;
    overflow: auto;
}

.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.info {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.copy-message {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>🌐 URL Encoder / Decoder</h2>

<textarea id="input" placeholder="Enter URL or encoded text..."></textarea>

<div class="button-grid">

<button onclick="encodeURL()">Encode</button>

<button onclick="decodeURL()">Decode</button>

<button onclick="copyOutput()">Copy</button>

<button onclick="clearAll()" class="clearBtn">Clear</button>

</div>

<div class="info" id="status"></div>

<div class="output" id="output"></div>

<div id="copyMessage" class="copy-message"></div>

</div>

<script>

// message system
function showMessage(msg, color){
    let el = document.getElementById("copyMessage");
    el.innerText = msg;
    el.style.color = color;
    el.style.display = "block";

    setTimeout(() => {
        el.style.display = "none";
    }, 2000);
}

// Encode URL
function encodeURL(){

    let text = document.getElementById("input").value;

    if(text.trim() === ""){
        document.getElementById("status").innerText = "❌ Enter URL/text to encode";
        document.getElementById("status").style.color = "red";
        return;
    }

    let encoded = encodeURIComponent(text);

    document.getElementById("output").innerText = encoded;

    document.getElementById("status").innerText = "✅ URL Encoded successfully";
    document.getElementById("status").style.color = "green";
}

// Decode URL
function decodeURL(){

    let text = document.getElementById("input").value;

    try {
        let decoded = decodeURIComponent(text);

        document.getElementById("output").innerText = decoded;

        document.getElementById("status").innerText = "✅ URL Decoded successfully";
        document.getElementById("status").style.color = "green";

    } catch (e) {
        document.getElementById("status").innerText = "❌ Invalid URL encoding";
        document.getElementById("status").style.color = "red";
        document.getElementById("output").innerText = "";
    }
}

// Copy output
function copyOutput(){

    let text = document.getElementById("output").innerText;

    if(text.trim() === ""){
        showMessage("Nothing to copy!", "#e63946");
        return;
    }

    navigator.clipboard.writeText(text);

    showMessage("Copied to Clipboard!", "#16a34a");
}

// Clear
function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("output").innerText = "";
    document.getElementById("status").innerText = "";
}

</script>

</body>
</html>
