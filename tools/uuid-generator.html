<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UUID Generator | UDI Digital Hub</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 380px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #0A4D8C;
}

button {
    background: #800000;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    background: #a00000;
}

#uuidBox {
    margin-top: 15px;
    background: #f1f1f1;
    padding: 12px;
    border-radius: 8px;
    word-break: break-all;
    font-size: 14px;
}

.copyBtn {
    margin-top: 10px;
    background: #0A4D8C;
}
</style>

</head>

<body>

<div class="container">

    <h2>🔑 UUID Generator</h2>

    <button onclick="generateUUID()">Generate UUID</button>

    <div id="uuidBox">Click generate to create UUID</div>

    <button class="copyBtn" onclick="copyUUID()">Copy UUID</button>

</div>

<script>

let currentUUID = "";

function generateUUID() {

    currentUUID = crypto.randomUUID();

    document.getElementById("uuidBox").innerText = currentUUID;
}

function copyUUID() {

    if (!currentUUID) return;

    navigator.clipboard.writeText(currentUUID);

    alert("UUID copied!");
}

</script>

</body>
</html>
