<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UUID Generator | UDI Digital Hub</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 380px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #0A4D8C;
}

button {
    background: #800000;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    background: #a00000;
}

#uuidBox {
    margin-top: 15px;
    background: #f1f1f1;
    padding: 12px;
    border-radius: 8px;
    word-break: break-all;
    font-size: 14px;
}

.copyBtn {
    margin-top: 10px;
    background: #0A4D8C;
}

/* 🔥 Toast Popup */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    
    background: rgba(0, 0, 0, 0.75);
    color: white;

    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;

    opacity: 0;
    pointer-events: none;

    transition: 0.3s ease;
}

#toast.show {
    opacity: 1;
}
</style>

</head>

<body>

<div class="container">

    <h2>🔑 UUID Generator</h2>

    <button onclick="generateUUID()">Generate UUID</button>

    <div id="uuidBox">Click generate to create UUID</div>

    <button class="copyBtn" onclick="copyUUID()">Copy UUID</button>

</div>

<!-- Toast message -->
<div id="toast"></div>

<script>

let currentUUID = "";

// Generate UUID
function generateUUID() {
    currentUUID = crypto.randomUUID();
    document.getElementById("uuidBox").innerText = currentUUID;
}

// Copy UUID
function copyUUID() {
    if (!currentUUID) {
        showToast("Generate UUID first!");
        return;
    }

    navigator.clipboard.writeText(currentUUID);
    showToast("Copied!");
}

// Toast function
function showToast(message) {
    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 1500);
}

</script>

</body>
</html>
